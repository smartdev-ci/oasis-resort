    <!-- Service Worker will be registered automatically by vite-plugin-pwa -->
    <!-- Auto registration is configured in vite.config.ts -->
    
    <!-- PWA Install Prompt -->
    <script>
      // Detect if app is running as PWA
      window.isPWA = window.matchMedia('(display-mode: standalone)').matches || 
                     window.matchMedia('(display-mode: window-controls-overlay)').matches;
      
      // Store PWA install prompt
      let deferredPrompt;
      
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show install button or banner
        const installBanner = document.createElement('div');
        installBanner.id = 'pwa-install-banner';
        installBanner.style.cssText = `
          position: fixed;
          bottom: 20px;
          left: 20px;
          right: 20px;
          background: #1A3A2A;
          color: white;
          padding: 16px;
          border-radius: 12px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 16px;
          z-index: 10000;
          box-shadow: 0 4px 20px rgba(26, 58, 42, 0.3);
        `;
        
        installBanner.innerHTML = `
          <div style="display: flex; align-items: center; gap: 12px;">
            <span style="font-size: 24px;">📱</span>
            <div>
              <strong>Installer Oasis Ressort</strong>
              <div style="font-size: 14px; opacity: 0.9;">Accédez rapidement à votre compagnon de voyage</div>
            </div>
          </div>
          <div style="display: flex; gap: 8px;">
            <button id="pwa-dismiss" style="background: none; border: none; color: white; cursor: pointer; font-size: 16px;">✕</button>
            <button id="pwa-install" style="background: #40916C; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer;">Installer</button>
          </div>
        `;
        
        document.body.appendChild(installBanner);
        
        document.getElementById('pwa-install').addEventListener('click', async () => {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            console.log('User accepted PWA install');
          }
          installBanner.remove();
          deferredPrompt = null;
        });
        
        document.getElementById('pwa-dismiss').addEventListener('click', () => {
          installBanner.remove();
          deferredPrompt = null;
        });
      });
    </script>
    
    <!-- iOS PWA Install Guide -->
    <script>
      // Show iOS install instructions
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                   (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      
      if (isIOS && !window.isPWA) {
        const iosGuide = document.createElement('div');
        iosGuide.id = 'ios-install-guide';
        iosGuide.style.cssText = `
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          background: #1A3A2A;
          color: white;
          padding: 12px 20px;
          border-radius: 8px;
          font-size: 14px;
          z-index: 10000;
          box-shadow: 0 4px 20px rgba(26, 58, 42, 0.3);
        `;
        iosGuide.innerHTML = `📱 Tap "Partager" puis "Sur l'écran d'accueil" pour installer`;
        
        setTimeout(() => {
          document.body.appendChild(iosGuide);
          setTimeout(() => iosGuide.remove(), 5000);
        }, 2000);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
